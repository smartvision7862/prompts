            border-radius: 8px;

            position: relative;
            overflow: hidden;
        }

            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--accent-blue);
            opacity: 0;
            transition: opacity 0.3s ease;

        .toast {

            bottom: 30px;
            right: 30px;
            background: var(--text-dark);
            color: var(--text-light);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;

            background-color: rgba(255,255,255,0.1);
            border-color: transparent;

        document.addEventListener('DOMContentLoaded', async () => {

                const response = await fetch('prompts.json');
                promptsData = await response.json();
            } catch (err) {
                console.error('Failed to load prompts:', err);
                return;
            }
            
            const container = document.getElementById('prompts-container');
            const tabBtns = document.querySelectorAll('.tab-btn');
            const mainTitle = document.getElementById('main-title');
            const subTitle = document.getElementById('sub-title');

            function renderCards(category) {
                container.innerHTML = '';
                
                promptsData[category].forEach((prompt, index) => {
                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    
                    let buttonText = 'Copy Prompt';
                    if (['roadmap', 'google', 'ai_skills'].includes(category)) {
                        buttonText = 'Copy Details';
                    } else if (category === 'shortcuts') {
                        buttonText = 'Copy Shortcut';
                    } else if (category === 'claude') {
                        buttonText = 'Copy Command';
                    }
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="prompt-number">${prompt.icon}</div>
                            <h3 class="prompt-title">${['roadmap', 'google', 'productivity', 'shortcuts', 'ai_skills', 'claude', 'learning', 'automation', 'video_ai'].includes(category) ? '' : (index + 1) + '. '}${prompt.title}</h3>
                        </div>
                        <div class="prompt-text">
                            ${prompt.category ? `<span class="prompt-category">${prompt.category}</span><br>` : ''}
                            ${prompt.text}
                        </div>
                        <button class="copy-btn" onclick="copyPrompt(this, \`${(category === 'claude' ? prompt.title.replace(/^\\d+\\.\\s*/, '') : prompt.text).replace(/`/g, '\\`').replace(/'/g, "\\'")}\`)">
                            <i class="fa-regular fa-copy"></i> ${buttonText}
                        </button>
                    `;
                    
                    container.appendChild(card);
                });
            }

            // Tab functionality
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const category = btn.dataset.tab;
                    
                    const titles = {
                        'branding': ['21 Powerful ChatGPT Prompts', 'Build a Powerful Personal Brand & Grow on Social Media'],
                        'content': ['25 Content Creation Prompts', 'Master Social Media, SEO, & Copywriting Strategy'],
                        'productivity': ['10 Productivity Prompts', '10X Your Productivity & Skills with ChatGPT'],
                        'interview': ['21 Interview Prompts', 'Ace Any Job Interview & Land Your Dream Job'],
                        'roadmap': ['Complete AI Roadmap', 'Master AI Fundamentals & Build Real-World Applications'],
                        'google': ['Google AI Ecosystem', 'From Research to Production: Tools, Models & Agents'],
                        'shortcuts': ['25 ChatGPT Shortcuts', 'Boost Your Efficiency with Keyboard Shortcuts'],
                        'ai_skills': ['12 AI Skills to Master', 'Upgrade your skills. Stay ahead. Lead the future.'],
                        'claude': ['99 Secret Claude Commands', 'Master AI interactions with these powerful slash commands'],
                        'learning': ['Learn By Doing', 'Master new skills with hands-on, interactive AI mentorship'],
                        'automation': ['11 Automation Prompts', 'Automate Your Daily Tasks and Skyrocket Productivity'],
                        'career': ['21 Career Growth Prompts', 'Improve Career, Income & Professional Growth'],
                        'video_ai': ['Video & Image AI Prompts', 'Master cinematic creation with advanced AI prompts']
                    };
                    
                    if(titles[category]) {
                        mainTitle.textContent = titles[category][0];
                        subTitle.textContent = titles[category][1];
                    }
                    
                    renderCards(category);
                });
            });

            // Initial render
            renderCards('branding');

            // Setup toast
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = '<i class="fa-solid fa-check"></i> Copied to clipboard';
            document.body.appendChild(toast);
        });

        function fallbackCopyTextToClipboard(text, btn) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                if (document.execCommand('copy')) {
                    showSuccess(btn);
                }
            } catch (err) {
                console.error('Fallback oops', err);
            }
            document.body.removeChild(textArea);
        }

        window.copyPrompt = function(btn, text) {
            if (!navigator.clipboard) {
                fallbackCopyTextToClipboard(text, btn);
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showSuccess(btn);
            }).catch(() => {
                fallbackCopyTextToClipboard(text, btn);
            });
        };

        function showSuccess(btn) {
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED';
            btn.style.background = 'var(--text-dark)';
            btn.style.color = 'var(--text-light)';
            
            const toast = document.querySelector('.toast');
            toast.classList.add('show');
            
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.style.background = '';
                btn.style.color = '';
                toast.classList.remove('show');
            }, 2000);
        }

        // Custom Cursor Logic
        if (window.matchMedia("(pointer: fine)").matches) {
            const cursorDot = document.querySelector('.cursor-dot');
            const cursorOutline = document.querySelector('.cursor-outline');
            
            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX;
                const posY = e.clientY;
                cursorDot.style.transform = `translate(${posX}px, ${posY}px) translate(-50%, -50%)`;
                cursorOutline.style.transform = `translate(${posX}px, ${posY}px) translate(-50%, -50%)`;
            });

            document.addEventListener('mouseover', (e) => {
                if (e.target.closest('button, a, .tab-btn, .prompt-card')) {
                    cursorOutline.classList.add('hover');
                }
            });

            document.addEventListener('mouseout', (e) => {
                if (e.target.closest('button, a, .tab-btn, .prompt-card')) {
                    cursorOutline.classList.remove('hover');
                }
            });
        }
    </script>
</body>
</html>
