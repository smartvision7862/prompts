<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Meta Tags -->
    <meta name="description" content="Ultimate Collection: Prompts, Roadmaps, AI Ecosystems, Shortcuts, and AI Skills for ChatGPT, Midjourney, Claude, and more.">
    <meta name="keywords" content="AI Prompts, ChatGPT Prompts, Midjourney Prompts, AI Ecosystem, Prompt Engineering, AI Tools, AI Roadmap, Claude Commands, Video AI">
    <meta name="author" content="SmartVision">
    <meta name="robots" content="index, follow">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://smartvision7862.github.io/prompts/">
    <meta property="og:title" content="Ultimate Prompts & AI Hub">
    <meta property="og:description" content="Ultimate Collection: Prompts, Roadmaps, AI Ecosystems, Shortcuts, and AI Skills for ChatGPT, Midjourney, Claude, and more.">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://smartvision7862.github.io/prompts/">
    <meta property="twitter:title" content="Ultimate Prompts & AI Hub">
    <meta property="twitter:description" content="Ultimate Collection: Prompts, Roadmaps, AI Ecosystems, Shortcuts, and AI Skills for ChatGPT, Midjourney, Claude, and more.">
    <!-- Theme & Manifest -->
    <meta name="theme-color" content="#000000">
    <link rel="canonical" href="https://smartvision7862.github.io/prompts/">
    <link rel="manifest" href="manifest.json">
    <title>Ultimate Prompts & AI Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-hero: #000000;
            --bg-footer: #2E2E86;
            --text-dark: #000000;
            --text-light: #ffffff;
            --text-muted: #3E3E3E;
            --accent-blue: #2E2E86;
            --border-light: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Navbar (Brand) */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 4rem;
            z-index: 100;
            mix-blend-mode: difference;
            pointer-events: none; /* Let clicks pass through if not on brand */
        }

        .brand-logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
            pointer-events: auto;
        }

        /* Hero Section */
        .hero-section {
            background-color: var(--bg-hero);
            min-height: 600px;
            padding: 160px 4rem 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .hero-content {
            max-width: 900px;
            margin-left: max(0px, calc((100vw - 1350px) / 2)); /* Container alignment */
        }

        .hero-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            font-weight: 500;
            color: #F0F0F0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: clamp(32px, 5vw, 64px);
            font-weight: 500;
            line-height: 1.1;
            color: var(--text-light);
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }

        .hero-section p {
            font-size: 18px;
            color: #F0F0F0;
            font-weight: 400;
            max-width: 600px;
            line-height: 1.5;
        }

        /* Main Content Container */
        .main-container {
            max-width: 1350px;
            margin: 0 auto;
            padding: 4rem;
        }

        /* Tabs (Workflow) */
        .tabs-container {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 4rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-light);
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-dark);
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .tab-btn:hover {
            border-color: var(--text-dark);
            background: #f5f5f5;
        }

        .tab-btn.active {
            background: var(--text-dark);
            color: var(--text-light);
            border-color: var(--text-dark);
        }

        /* Grid */
        .prompts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2rem;
        }

        /* Feature Cards */
        .prompt-card {
            background: linear-gradient(0deg, rgb(46, 46, 134) 7.6%, rgba(243, 248, 240, 0) 100%);
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: 1px solid var(--border-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .prompt-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--accent-blue);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .prompt-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(46, 46, 134, 0.12);
        }

        .prompt-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .prompt-number {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-blue);
            flex-shrink: 0;
        }

        .prompt-title {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 500;
            color: var(--text-dark);
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .prompt-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-muted);
            flex-grow: 1;
            white-space: pre-line;
        }
        
        .prompt-category {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            background: var(--accent-blue);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            background: #ffffff;
            border: 1px solid #d1d5db;
            color: var(--text-dark);
            padding: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: auto;
        }

        .copy-btn:hover {
            background: var(--text-dark);
            color: var(--text-light);
            border-color: var(--text-dark);
        }

        .copy-btn:active {
            transform: scale(0.98);
        }

        /* Footer */
        .site-footer {
            background-color: var(--bg-footer);
            color: var(--text-light);
            padding: 6rem 4rem;
            text-align: center;
            margin-top: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .footer-heading {
            font-size: clamp(32px, 4vw, 50px);
            font-weight: 500;
            letter-spacing: -1px;
        }

        .footer-copy {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: #a5a5c5;
            text-transform: uppercase;
            margin-top: 2rem;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--text-dark);
            color: var(--text-light);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            padding: 1rem 1.5rem;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-section { padding: 120px 2rem 60px; min-height: auto; }
            .main-container { padding: 2rem; }
            nav { padding: 0 2rem; }
            .prompts-grid { grid-template-columns: 1fr; }
            .site-footer { padding: 4rem 2rem; }
        }

        /* Custom Cursor (Inverted for light theme) */
        @media (pointer: fine) {
            body, a, button, .tab-btn, .copy-btn { cursor: none; }
        }

        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            mix-blend-mode: difference;
        }

        .cursor-dot {
            width: 6px; height: 6px;
            background-color: white;
            transition: transform 0.05s linear;
        }

        .cursor-outline {
            width: 36px; height: 36px;
            border: 1px solid rgba(255,255,255,0.7);
            transition: transform 0.15s ease-out, width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s;
        }

        .cursor-outline.hover {
            width: 60px; height: 60px;
            background-color: rgba(255,255,255,0.1);
            border-color: transparent;
        }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav>
        <div class="brand-logo">Two.AI</div>
    </nav>
    
    <header class="hero-section">
        <div class="hero-content">
            <span class="hero-label">Ultimate AI Resource</span>
            <h1 id="main-title">21 Powerful ChatGPT Prompts</h1>
            <p id="sub-title">Build a Powerful Personal Brand & Grow on Social Media</p>
        </div>
    </header>

    <div class="main-container">
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="branding">Branding</button>
            <button class="tab-btn" data-tab="content">Content</button>
            <button class="tab-btn" data-tab="productivity">Productivity</button>
            <button class="tab-btn" data-tab="interview">Interviews</button>
            <button class="tab-btn" data-tab="roadmap">AI Roadmap</button>
            <button class="tab-btn" data-tab="google">Google AI</button>
            <button class="tab-btn" data-tab="shortcuts">Shortcuts</button>
            <button class="tab-btn" data-tab="ai_skills">12 AI Skills</button>
            <button class="tab-btn" data-tab="claude">Claude</button>
            <button class="tab-btn" data-tab="learning">Learning</button>
            <button class="tab-btn" data-tab="automation">Automation</button>
            <button class="tab-btn" data-tab="career">Career</button>
            <button class="tab-btn" data-tab="video_ai">Video AI</button>
        </div>

        <main>
            <div class="prompts-grid" id="prompts-container">
                <!-- Cards injected here via JS -->
            </div>
        </main>
    </div>

    <footer class="site-footer">
        <h2 class="footer-heading">Transform Your Workflow</h2>
        <div class="footer-copy">© 2026 AI Talkbot. All rights reserved.</div>
    </footer>

    <script>
        let promptsData = {};

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('prompts.json');
                promptsData = await response.json();
            } catch (err) {
                console.error('Failed to load prompts:', err);
                return;
            }
            
            const container = document.getElementById('prompts-container');
            const tabBtns = document.querySelectorAll('.tab-btn');
            const mainTitle = document.getElementById('main-title');
            const subTitle = document.getElementById('sub-title');

            function renderCards(category) {
                container.innerHTML = '';
                
                promptsData[category].forEach((prompt, index) => {
                    const card = document.createElement('div');
                    card.className = 'prompt-card';
                    
                    let buttonText = 'Copy Prompt';
                    if (['roadmap', 'google', 'ai_skills'].includes(category)) {
                        buttonText = 'Copy Details';
                    } else if (category === 'shortcuts') {
                        buttonText = 'Copy Shortcut';
                    } else if (category === 'claude') {
                        buttonText = 'Copy Command';
                    }
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="prompt-number">${prompt.icon}</div>
                            <h3 class="prompt-title">${['roadmap', 'google', 'productivity', 'shortcuts', 'ai_skills', 'claude', 'learning', 'automation', 'video_ai'].includes(category) ? '' : (index + 1) + '. '}${prompt.title}</h3>
                        </div>
                        <div class="prompt-text">
                            ${prompt.category ? `<span class="prompt-category">${prompt.category}</span><br>` : ''}
                            ${prompt.text}
                        </div>
                        <button class="copy-btn" onclick="copyPrompt(this, \`${(category === 'claude' ? prompt.title.replace(/^\\d+\\.\\s*/, '') : prompt.text).replace(/`/g, '\\`').replace(/'/g, "\\'")}\`)">
                            <i class="fa-regular fa-copy"></i> ${buttonText}
                        </button>
                    `;
                    
                    container.appendChild(card);
                });
            }

            // Tab functionality
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const category = btn.dataset.tab;
                    
                    const titles = {
                        'branding': ['21 Powerful ChatGPT Prompts', 'Build a Powerful Personal Brand & Grow on Social Media'],
                        'content': ['25 Content Creation Prompts', 'Master Social Media, SEO, & Copywriting Strategy'],
                        'productivity': ['10 Productivity Prompts', '10X Your Productivity & Skills with ChatGPT'],
                        'interview': ['21 Interview Prompts', 'Ace Any Job Interview & Land Your Dream Job'],
                        'roadmap': ['Complete AI Roadmap', 'Master AI Fundamentals & Build Real-World Applications'],
                        'google': ['Google AI Ecosystem', 'From Research to Production: Tools, Models & Agents'],
                        'shortcuts': ['25 ChatGPT Shortcuts', 'Boost Your Efficiency with Keyboard Shortcuts'],
                        'ai_skills': ['12 AI Skills to Master', 'Upgrade your skills. Stay ahead. Lead the future.'],
                        'claude': ['99 Secret Claude Commands', 'Master AI interactions with these powerful slash commands'],
                        'learning': ['Learn By Doing', 'Master new skills with hands-on, interactive AI mentorship'],
                        'automation': ['11 Automation Prompts', 'Automate Your Daily Tasks and Skyrocket Productivity'],
                        'career': ['21 Career Growth Prompts', 'Improve Career, Income & Professional Growth'],
                        'video_ai': ['Video & Image AI Prompts', 'Master cinematic creation with advanced AI prompts']
                    };
                    
                    if(titles[category]) {
                        mainTitle.textContent = titles[category][0];
                        subTitle.textContent = titles[category][1];
                    }
                    
                    renderCards(category);
                });
            });

            // Initial render
            renderCards('branding');

            // Setup toast
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = '<i class="fa-solid fa-check"></i> Copied to clipboard';
            document.body.appendChild(toast);
        });

        function fallbackCopyTextToClipboard(text, btn) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                if (document.execCommand('copy')) {
                    showSuccess(btn);
                }
            } catch (err) {
                console.error('Fallback oops', err);
            }
            document.body.removeChild(textArea);
        }

        window.copyPrompt = function(btn, text) {
            if (!navigator.clipboard) {
                fallbackCopyTextToClipboard(text, btn);
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showSuccess(btn);
            }).catch(() => {
                fallbackCopyTextToClipboard(text, btn);
            });
        };

        function showSuccess(btn) {
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> COPIED';
            btn.style.background = 'var(--text-dark)';
            btn.style.color = 'var(--text-light)';
            
            const toast = document.querySelector('.toast');
            toast.classList.add('show');
            
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.style.background = '';
                btn.style.color = '';
                toast.classList.remove('show');
            }, 2000);
        }

        // Custom Cursor Logic
        if (window.matchMedia("(pointer: fine)").matches) {
            const cursorDot = document.querySelector('.cursor-dot');
            const cursorOutline = document.querySelector('.cursor-outline');
            
            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX;
                const posY = e.clientY;
                cursorDot.style.transform = `translate(${posX}px, ${posY}px) translate(-50%, -50%)`;
                cursorOutline.style.transform = `translate(${posX}px, ${posY}px) translate(-50%, -50%)`;
            });

            document.addEventListener('mouseover', (e) => {
                if (e.target.closest('button, a, .tab-btn, .prompt-card')) {
                    cursorOutline.classList.add('hover');
                }
            });

            document.addEventListener('mouseout', (e) => {
                if (e.target.closest('button, a, .tab-btn, .prompt-card')) {
                    cursorOutline.classList.remove('hover');
                }
            });
        }
    </script>
</body>
</html>
